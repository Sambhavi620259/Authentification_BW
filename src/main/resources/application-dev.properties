############################################
# SERVER CONFIGURATION
############################################
server.port=8080
server.address=0.0.0.0

############################################
# DATABASE (LOCAL MYSQL)
############################################
spring.datasource.url=jdbc:mysql://localhost:3306/authify_app?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=authify_user
spring.datasource.password=root123

############################################
# HIKARI CONNECTION POOL
############################################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

############################################
# JPA / HIBERNATE
############################################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

############################################
# JWT CONFIGURATION
############################################
auth.jwt.secret=dev-secret-key-change-this
auth.jwt.expiration=86400000

############################################
# MAIL CONFIG (OPTIONAL - DEV)
############################################
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=your-email@gmail.com

############################################
# LOGGING
############################################
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.in.bawvpl.Authify=DEBUG